services:
  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.17.4
    container_name: cashi-tigerbeetle
    security_opt:
      - seccomp=unconfined
    command:
      - start
      - --addresses=0.0.0.0:3000
      - --development
      - /data/0_0.tigerbeetle
    ports:
      - "3000:3000"
    volumes:
      - tigerbeetle-data:/data


  restate:
    image: docker.restate.dev/restatedev/restate:latest
    container_name: cashi-restate
    ports:
      - "8080:8080"
      - "9070:9070"
      - "9071:9071"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - restate-data:/restate-data

volumes:
  tigerbeetle-data:
  restate-data:

